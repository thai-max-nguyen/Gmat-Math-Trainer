<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GMAT Trainer — Sign In</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.75s linear infinite; display: inline-block; }
  .btn-auth {
    width: 100%; background: #3b82f6; color: #fff;
    font-weight: 700; padding: 13px; border-radius: 12px;
    font-size: 14px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s; box-shadow: 0 8px 24px rgba(59,130,246,0.25);
  }
  .btn-auth:hover { background: #2563eb; }
  .tab-switch { display: flex; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .tab-switch button { flex: 1; padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: background 0.15s, color 0.15s; background: none; color: rgba(255,255,255,0.4); }
  .tab-switch button.active { background: rgba(255,255,255,0.1); color: #fff; }
</style>
</head>
<body style="background:#090e1d;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">

<!-- Background glows -->
<div style="position:fixed;inset:0;pointer-events:none;overflow:hidden">
  <div style="position:absolute;top:-20%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(30,58,138,0.35) 0%,transparent 70%);border-radius:50%"></div>
  <div style="position:absolute;top:10%;right:-5%;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);border-radius:50%"></div>
</div>

<div style="position:relative;z-index:1;width:100%;max-width:420px">
  <!-- Mascot + title -->
  <div style="text-align:center;margin-bottom:28px">
    <div style="display:inline-block;margin-bottom:12px;position:relative">
      <svg width="80" height="80" viewBox="0 0 90 90" fill="none">
        <ellipse cx="45" cy="52" rx="28" ry="30" fill="#3b82f6"/>
        <circle cx="45" cy="28" r="22" fill="#3b82f6"/>
        <circle cx="45" cy="28" r="18" fill="#60a5fa" opacity="0.3"/>
        <ellipse cx="37" cy="26" rx="6" ry="7" fill="white"/>
        <ellipse cx="53" cy="26" rx="6" ry="7" fill="white"/>
        <circle cx="38" cy="27" r="3.5" fill="#1e3a5f"/>
        <circle cx="54" cy="27" r="3.5" fill="#1e3a5f"/>
        <circle cx="39.5" cy="25.5" r="1.2" fill="white"/>
        <circle cx="55.5" cy="25.5" r="1.2" fill="white"/>
        <path d="M37 34 Q45 41 53 34" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <rect x="26" y="10" width="38" height="5" rx="2" fill="#1d4ed8"/>
        <polygon points="45,2 26,10 64,10" fill="#1d4ed8"/>
        <line x1="62" y1="10" x2="66" y2="18" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="66" cy="19" r="2.5" fill="#fbbf24"/>
        <ellipse cx="17" cy="55" rx="5" ry="8" fill="#3b82f6" transform="rotate(-30 17 55)"/>
        <ellipse cx="73" cy="55" rx="5" ry="8" fill="#3b82f6" transform="rotate(30 73 55)"/>
        <rect x="31" y="57" width="28" height="18" rx="3" fill="#1d4ed8"/>
        <line x1="45" y1="57" x2="45" y2="75" stroke="#60a5fa" stroke-width="1.5"/>
        <ellipse cx="36" cy="81" rx="9" ry="5" fill="#2563eb"/>
        <ellipse cx="54" cy="81" rx="9" ry="5" fill="#2563eb"/>
      </svg>
      <div style="position:absolute;top:-4px;right:-4px;font-size:16px;animation:bounce 1s infinite alternate">✨</div>
    </div>
    <h1 style="font-size:28px;font-weight:900;color:#f8fafc;margin:0 0 6px;letter-spacing:-0.03em">GMAT Trainer</h1>
    <p style="font-size:14px;color:#64748b;margin:0">Ready to crush that score? 🎯</p>
  </div>

  <!-- Auth card -->
  <div class="auth-card">
    <!-- Tab switcher -->
    <div class="tab-switch">
      <button id="tab-login-btn" class="active" onclick="showAuthTab('login')">Sign In</button>
      <button id="tab-signup-btn" onclick="showAuthTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="screen-login">
      <div id="login-error" class="hidden" style="margin-bottom:16px;padding:12px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:13px;text-align:center"></div>
      <div id="login-success" class="hidden" style="margin-bottom:16px;padding:12px;border-radius:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:13px;text-align:center"></div>

      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:600;color:#cbd5e1;margin-bottom:8px">Email address</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon" style="font-size:18px">mail</span>
          <input id="login-email" type="email" placeholder="name@example.com" class="auth-input" onkeydown="if(event.key==='Enter') handleLogin()"/>
        </div>
      </div>

      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <label style="font-size:13px;font-weight:600;color:#cbd5e1">Password</label>
          <button onclick="handleForgotPassword()" style="font-size:13px;font-weight:600;color:#3b82f6;background:none;border:none;cursor:pointer">Forgot password?</button>
        </div>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon" style="font-size:18px">lock</span>
          <input id="login-password" type="password" placeholder="••••••••" class="auth-input" onkeydown="if(event.key==='Enter') handleLogin()"/>
        </div>
      </div>

      <button id="btn-login" onclick="handleLogin()" class="btn-auth">Sign In &nbsp;→</button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="screen-signup" class="hidden">
      <div id="signup-error" class="hidden" style="margin-bottom:16px;padding:12px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:13px;text-align:center"></div>
      <div id="signup-success" class="hidden" style="margin-bottom:16px;padding:12px;border-radius:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;font-size:13px;text-align:center"></div>

      <div style="margin-bottom:14px">
        <label style="display:block;font-size:13px;font-weight:600;color:#cbd5e1;margin-bottom:8px">Email address</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon" style="font-size:18px">mail</span>
          <input id="signup-email" type="email" placeholder="name@example.com" class="auth-input"/>
        </div>
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:13px;font-weight:600;color:#cbd5e1;margin-bottom:8px">Password</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon" style="font-size:18px">lock</span>
          <input id="signup-password" type="password" placeholder="Min 6 characters" class="auth-input" style="padding-right:44px"/>
          <button onclick="togglePw('signup-password',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b">
            <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
          </button>
        </div>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:600;color:#cbd5e1;margin-bottom:8px">Confirm Password</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon" style="font-size:18px">shield</span>
          <input id="signup-confirm" type="password" placeholder="••••••••" class="auth-input" onkeydown="if(event.key==='Enter') handleSignup()"/>
        </div>
      </div>

      <button id="btn-signup" onclick="handleSignup()" class="btn-auth">Create Account &nbsp;→</button>
      <p style="text-align:center;font-size:11px;color:#334155;margin-top:12px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700">🔒 Secure · Encrypted</p>
    </div>
  </div>

  <p style="text-align:center;margin-top:20px;font-size:12px;color:#1e293b">
    Privacy Policy &nbsp;·&nbsp; Terms &nbsp;·&nbsp; Support
  </p>
</div>

<script>
  function showAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('screen-login').classList.toggle('hidden', !isLogin);
    document.getElementById('screen-signup').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login-btn').classList.toggle('active', isLogin);
    document.getElementById('tab-signup-btn').classList.toggle('active', !isLogin);
  }
  function showScreen(name) {
    showAuthTab(name === 'login' ? 'login' : 'signup');
  }
  @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-4px); } }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
</body>
</html>
